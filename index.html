<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>QR + Explorer File Manager</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f3f3f3;
}

.container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #ffffff;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.sidebar h3 {
  font-size: 13px;
  color: #666;
  margin-top: 15px;
}

.nav {
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}

.nav:hover { background: #eaeaea; }

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.toolbar {
  height: 50px;
  background: white;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
}

button {
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover { background: #f0f0f0; }

.content {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

.dropzone {
  border: 2px dashed #aaa;
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  text-align: center;
}

.file-row {
  display: flex;
  align-items: center;
  padding: 8px;
  background: white;
  border-radius: 6px;
  margin-bottom: 6px;
  cursor: pointer;
}

.file-row:hover {
  background: #eaf3ff;
}

.file-name {
  flex: 1;
  margin-left: 10px;
}

.badge {
  font-size: 12px;
  color: #888;
}

.hidden { display: none; }

.progress-item {
  background: white;
  margin: 6px 0;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

.progress-bar {
  height: 6px;
  background: #eee;
  border-radius: 4px;
  overflow: hidden;
  margin-top: 6px;
}

.progress-bar-inner {
  height: 100%;
  width: 0%;
  background: #4a90e2;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h3>二维码工具</h3>
    <div class="nav" onclick="showQR()">🔗 QR生成</div>

    <h3>文件</h3>
    <div class="nav" onclick="loadFiles()">📁 所有文件</div>
  </div>

  <div class="main">

    <div class="toolbar">
      <button onclick="fileInput.click()">上传</button>
      <button onclick="deleteSelected()">删除</button>
      <button onclick="loadFiles()">刷新</button>
      <input type="file" id="fileInput" multiple class="hidden" />
    </div>

    <div id="uploadProgress"></div>

    <div class="content">

      <!-- QR -->
      <div id="qrPage">
        <h2>二维码生成</h2>

        <div id="qrDropzone" class="dropzone">拖拽文件到这里（QR）</div>

        <input id="text" placeholder="文本" />
        <button onclick="genText()">生成QR</button>

        <input id="url" placeholder="URL" />
        <button onclick="genUrl()">短链QR</button>

        <hr />
        <img id="qr" style="width:200px;height:200px;" />
        <p id="info"></p>
      </div>

      <!-- files -->
      <div id="filePage" class="hidden">
        <div id="dropzone" class="dropzone">拖拽文件上传</div>
        <div id="fileList"></div>
      </div>

    </div>
  </div>
</div>

<script>

const API = "https://qrapi.mutucun.com";

let files = [];
let selected = new Set();

/* ========== init ========= */
loadFiles();

/* ========== QR ========== */
async function genText(){
  const text = text.value;
  const res = await fetch(`${API}/text?data=${encodeURIComponent(text)}`);
  const data = await res.json();
  qr.src = data.qr;
  info.innerText = data.data;
}

async function genUrl(){
  const url = url.value;
  const res = await fetch(`${API}/short?url=${encodeURIComponent(url)}`);
  const data = await res.json();
  qr.src = data.qr;
  info.innerText = data.shortUrl;
}

/* ========== show QR ========== */
function showQR(){
  qrPage.classList.remove("hidden");
  filePage.classList.add("hidden");
}

/* ========== load files ========== */
function loadFiles(){
  qrPage.classList.add("hidden");
  filePage.classList.remove("hidden");

  fetch(`${API}/files`)
    .then(r => r.json())
    .then(d => {
      files = d;
      render();
    });
}

/* ========== render ========== */
function render(){
  const box = fileList;
  box.innerHTML = "";

  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file-row";

    div.innerHTML = `
      <input type="checkbox" onchange="toggle('${f.key}')" ${selected.has(f.key)?"checked":""}>
      <div class="file-name">📄 ${f.name || f.key}</div>
      <div class="badge">open</div>
    `;

    div.ondblclick = () => window.open(f.fileUrl || f.url);

    box.appendChild(div);
  });
}

/* ========== toggle ========== */
function toggle(k){
  selected.has(k) ? selected.delete(k) : selected.add(k);
}

/* ========== delete ========== */
async function deleteSelected(){
  await fetch(`${API}/delete`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify([...selected])
  });

  selected.clear();
  loadFiles();
}

/* ========== upload (fixed + QR support) ========== */
async function upload(list){

  uploadProgress.innerHTML = "";

  for(let file of list){

    const item = document.createElement("div");
    item.className = "progress-item";
    item.innerHTML = `
      <div>${file.name}</div>
      <div class="progress-bar"><div class="progress-bar-inner"></div></div>
    `;

    const bar = item.querySelector(".progress-bar-inner");
    uploadProgress.appendChild(item);

    await new Promise((resolve, reject) => {

      const xhr = new XMLHttpRequest();
      xhr.open("POST", `${API}/upload`);

      xhr.upload.onprogress = e => {
        if(e.lengthComputable){
          bar.style.width = (e.loaded/e.total)*100 + "%";
        }
      };

      xhr.onload = () => {
        try {
          const res = JSON.parse(xhr.responseText);
          bar.style.width = "100%";

          if(res.qr){
            qr.src = res.qr;
            info.innerText = res.fileUrl;
          }

          resolve(res);
        } catch(e){
          reject(e);
        }
      };

      xhr.onerror = reject;

      const fd = new FormData();
      fd.append("file", file);
      xhr.send(fd);
    });
  }

  loadFiles();
}

/* ========== input ========== */
fileInput.onchange = e => upload(e.target.files);

/* ========== drop files ========== */
dropzone.ondragover = e => {
  e.preventDefault();
  dropzone.style.background="#eaf3ff";
};
dropzone.ondragleave = () => dropzone.style.background="white";
dropzone.ondrop = e => {
  e.preventDefault();
  upload(e.dataTransfer.files);
};

/* QR drop */
qrDropzone.ondragover = e => {
  e.preventDefault();
  qrDropzone.style.background="#eaf3ff";
};
qrDropzone.ondragleave = () => qrDropzone.style.background="white";
qrDropzone.ondrop = e => {
  e.preventDefault();
  upload(e.dataTransfer.files);
};

</script>

</body>
</html>
