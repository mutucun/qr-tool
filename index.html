<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>QR + File Manager</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#f3f3f3;
}

.container { display:flex; height:100vh; }

.sidebar {
  width:220px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
}

.nav {
  padding:8px;
  cursor:pointer;
  border-radius:6px;
}

.nav:hover { background:#eaeaea; }

.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

.toolbar {
  height:50px;
  background:#fff;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 10px;
}

button {
  padding:6px 10px;
  border:1px solid #ccc;
  background:#fff;
  border-radius:6px;
  cursor:pointer;
}

button:hover { background:#f0f0f0; }

.content {
  flex:1;
  padding:10px;
  overflow:auto;
}

.dropzone {
  border:2px dashed #aaa;
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  text-align:center;
}

.file-row {
  display:flex;
  align-items:center;
  padding:8px;
  background:#fff;
  margin-bottom:6px;
  border-radius:6px;
}

.file-name { flex:1; margin-left:10px; }

.hidden { display:none; }

.progress-item {
  background:#fff;
  margin:6px 0;
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
}

.progress-bar {
  height:6px;
  background:#eee;
  border-radius:4px;
  overflow:hidden;
  margin-top:6px;
}

.progress-bar-inner {
  height:100%;
  width:0%;
  background:#4a90e2;
}

#previewBox {
  margin-top:10px;
  padding:10px;
  background:#fff;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h3>二维码工具</h3>
    <div class="nav" onclick="showQR()">QR生成</div>

    <h3>模式</h3>
    <button onclick="toggleMode()" id="modeBtn">模式：单二维码</button>

    <h3>文件</h3>
    <div class="nav" onclick="loadFiles()">文件管理</div>
  </div>

  <div class="main">

    <div class="toolbar">
      <button onclick="fileInput.click()">上传</button>
      <button onclick="deleteSelected()">删除</button>
      <button onclick="refreshFiles()">刷新</button>

      <!-- ⭐ 新增 -->
      <button onclick="toggleSelectAll()">全选</button>

      <input type="file" id="fileInput" multiple class="hidden" />
    </div>

    <div id="uploadProgress"></div>

    <div class="content">

      <!-- QR -->
      <div id="qrPage">
        <h2>二维码生成</h2>

        <div id="qrDropzone" class="dropzone">拖拽上传（QR）</div>

        <img id="qr" style="width:200px;height:200px;" />
        <p id="info"></p>

        <div id="multiQRBox"></div>
      </div>

      <!-- FILES -->
      <div id="filePage" class="hidden">
        <div id="dropzone" class="dropzone">拖拽上传文件</div>

        <div id="fileList"></div>

        <!-- ⭐ 预览区 -->
        <div id="previewBox"></div>
      </div>

    </div>
  </div>
</div>

<script>

const API = "https://qrapi.mutucun.com";

let qrMode = "single";
let files = [];
let selected = new Set();

const $ = (id)=>document.getElementById(id);

/* ================= mode ================= */
function toggleMode(){
  qrMode = qrMode === "single" ? "group" : "single";
  $("modeBtn").innerText =
    "模式：" + (qrMode === "single" ? "单二维码" : "集合二维码");
}

/* ================= QR ================= */
function showQRResult(res){

  const url = res.groupUrl || res.fileUrl;

  if(qrMode === "single"){
    $("qr").src = res.qr;
    $("info").innerText = url;
    $("multiQRBox").innerHTML = "";
  } else {
    $("qr").src = res.qr;
    $("info").innerText = url;
    $("multiQRBox").innerHTML = `
      <div>${url}</div>
      <img src="${res.qr}">
    `;
  }
}

/* ================= upload ================= */
async function upload(list){

  $("uploadProgress").innerHTML = "";

  if(qrMode === "group" && list.length > 1){

    const fd = new FormData();
    for(const f of list) fd.append("file", f);

    const res = await fetch(`${API}/upload-group`, {
      method:"POST",
      body: fd
    });

    const data = await res.json();
    showQRResult(data);
    refreshFiles();
    return;
  }

  for(const file of list){

    const item = document.createElement("div");
    item.className = "progress-item";
    item.innerHTML = `
      <div>${file.name}</div>
      <div class="progress-bar"><div class="progress-bar-inner"></div></div>
    `;

    const bar = item.querySelector(".progress-bar-inner");
    $("uploadProgress").appendChild(item);

    await new Promise((resolve,reject)=>{

      const xhr = new XMLHttpRequest();
      xhr.open("POST", `${API}/upload`);

      xhr.upload.onprogress = e=>{
        if(e.lengthComputable){
          bar.style.width = (e.loaded/e.total)*100 + "%";
        }
      };

      xhr.onload = ()=>{
        const res = JSON.parse(xhr.responseText);
        bar.style.width = "100%";

        const div = document.createElement("div");
        div.innerHTML = `
          <div>${res.fileUrl}</div>
          <img src="${res.qr}" width="120">
        `;
        $("multiQRBox").appendChild(div);

        resolve(res);
      };

      xhr.onerror = reject;

      const fd = new FormData();
      fd.append("file", file);
      xhr.send(fd);
    });
  }

  refreshFiles();
}

/* ================= files ================= */
function loadFiles(){
  $("qrPage").classList.add("hidden");
  $("filePage").classList.remove("hidden");
  refreshFiles();
}

function refreshFiles(){
  fetch(`${API}/files`)
    .then(r=>r.json())
    .then(d=>{
      files = d;
      render();
    });
}

/* ================= render + preview ================= */
function render(){
  $("fileList").innerHTML = "";

  files.forEach(f=>{
    const div=document.createElement("div");
    div.className="file-row";

    div.innerHTML=`
      <input type="checkbox" onchange="toggle('${f.key}', this)">
      <div class="file-name">${f.name}</div>
      <button onclick="previewFile('${f.url}')">预览</button>
    `;

    div.ondblclick=()=>window.open(f.url);
    $("fileList").appendChild(div);
  });
}

function toggle(k, el){
  if(el.checked) selected.add(k);
  else selected.delete(k);
}

/* ================= 全选 ================= */
function toggleSelectAll(){
  const boxes = document.querySelectorAll("#fileList input[type=checkbox]");

  const shouldSelect = selected.size !== files.length;

  selected.clear();

  boxes.forEach((b,i)=>{
    b.checked = shouldSelect;
    if(shouldSelect) selected.add(files[i].key);
  });
}

/* ================= 预览 ================= */
function previewFile(url){

  const box = $("previewBox");
  box.innerHTML = "加载中...";

  fetch(url)
    .then(r=>r.blob())
    .then(blob=>{

      if(blob.type.startsWith("image/")){
        const img = document.createElement("img");
        img.src = URL.createObjectURL(blob);
        img.style.maxWidth = "300px";
        box.innerHTML = "";
        box.appendChild(img);
        return;
      }

      if(blob.type.startsWith("text/")){
        const reader = new FileReader();
        reader.onload = ()=>{
          box.innerHTML =
            `<pre style="white-space:pre-wrap">${reader.result.slice(0,2000)}</pre>`;
        };
        reader.readAsText(blob);
        return;
      }

      box.innerHTML = `<a href="${url}" target="_blank">无法预览，点击下载</a>`;
    });
}

/* ================= delete ================= */
async function deleteSelected(){
  await fetch(`${API}/delete`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify([...selected])
  });

  selected.clear();
  refreshFiles();
}

/* ================= drag ================= */
function bind(id){
  const el=$(id);
  if(!el) return;

  el.ondragover=e=>{
    e.preventDefault();
    el.style.background="#eaf3ff";
  };

  el.ondragleave=()=>el.style.background="#fff";

  el.ondrop=e=>{
    e.preventDefault();
    el.style.background="#fff";
    upload(e.dataTransfer.files);
  };
}

bind("dropzone");
bind("qrDropzone");

/* ================= input ================= */
fileInput.onchange=e=>upload(e.target.files);

/* ================= page ================= */
function showQR(){
  $("qrPage").classList.remove("hidden");
  $("filePage").classList.add("hidden");
}

</script>

</body>
</html>
