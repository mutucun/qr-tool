<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>QR + Explorer File Manager</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f3f3f3;
}

/* ================= 布局 ================= */
.container {
  display: flex;
  height: 100vh;
}

/* ================= 左侧栏 ================= */
.sidebar {
  width: 220px;
  background: #ffffff;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.sidebar h3 {
  font-size: 13px;
  color: #666;
  margin-top: 15px;
}

.nav {
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}

.nav:hover {
  background: #eaeaea;
}

/* ================= 主区域 ================= */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ================= toolbar ================= */
.toolbar {
  height: 50px;
  background: white;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
}

button {
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #f0f0f0;
}

/* ================= 内容区 ================= */
.content {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

/* ================= dropzone ================= */
.dropzone {
  border: 2px dashed #aaa;
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  text-align: center;
}

/* ================= 文件行（Explorer风格） ================= */
.file-row {
  display: flex;
  align-items: center;
  padding: 8px;
  background: white;
  border-radius: 6px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.file-row:hover {
  background: #eaf3ff;
}

.file-name {
  flex: 1;
  margin-left: 10px;
}

.badge {
  font-size: 12px;
  color: #888;
}

.hidden { display: none; }

</style>
</head>

<body>

<div class="container">

  <!-- ================= 左侧栏 ================= -->
  <div class="sidebar">
    <h3>二维码工具</h3>
    <div class="nav" onclick="showQR()">🔗 QR生成</div>

    <h3>文件</h3>
    <div class="nav" onclick="loadFiles()">📁 所有文件</div>
    <div class="nav" onclick="alert('可扩展')">⭐ 收藏</div>
  </div>

  <!-- ================= 主区域 ================= -->
  <div class="main">

    <!-- toolbar -->
    <div class="toolbar">
      <button onclick="document.getElementById('fileInput').click()">上传</button>
      <button onclick="deleteSelected()">删除</button>
      <button onclick="loadFiles()">刷新</button>

      <input type="file" id="fileInput" multiple class="hidden" />
    </div>

    <!-- content -->
    <div class="content">

      <!-- ================= QR区域 ================= -->
      <div id="qrPage">
        <h2>二维码生成</h2>

        <!-- ✅ 新增：QR拖拽上传区域 -->
        <div id="qrDropzone" class="dropzone">
          拖拽文件到这里上传（QR页面）
        </div>

        <input id="text" placeholder="文本" />
        <button onclick="genText()">生成QR</button>

        <input id="url" placeholder="URL" />
        <button onclick="genUrl()">短链QR</button>

        <hr />
        <img id="qr" style="width:200px;height:200px;" />
        <p id="info"></p>
      </div>

      <!-- ================= 文件管理 ================= -->
      <div id="filePage" class="hidden">

        <div id="dropzone" class="dropzone">
          拖拽文件到这里上传
        </div>

        <div id="fileList"></div>

      </div>

    </div>
  </div>
</div>

<script>

const API = "https://qrapi.mutucun.com";

let files = [];
let selected = new Set();

/* ================= 页面切换 ================= */
function showQR(){
  document.getElementById("qrPage").classList.remove("hidden");
  document.getElementById("filePage").classList.add("hidden");
}

function loadFiles(){
  document.getElementById("qrPage").classList.add("hidden");
  document.getElementById("filePage").classList.remove("hidden");

  fetch(`${API}/files`)
    .then(r => r.json())
    .then(data => {
      files = data;
      render();
    });
}

/* ================= QR ================= */
async function genText(){
  const text = document.getElementById("text").value;

  const res = await fetch(`${API}/text?data=${encodeURIComponent(text)}`);
  const data = await res.json();

  document.getElementById("qr").src = data.qr;
  document.getElementById("info").innerText = data.data;
}

async function genUrl(){
  const url = document.getElementById("url").value;

  const res = await fetch(`${API}/short?url=${encodeURIComponent(url)}`);
  const data = await res.json();

  document.getElementById("qr").src = data.qr;
  document.getElementById("info").innerText = data.shortUrl;
}

/* ================= 渲染文件 ================= */
function render(){
  const box = document.getElementById("fileList");
  box.innerHTML = "";

  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file-row";

    div.innerHTML = `
      <input type="checkbox" ${selected.has(f.key) ? "checked":""} onchange="toggle('${f.key}')">
      <div class="file-name">📄 ${f.name}</div>
      <div class="badge">preview</div>
    `;

    div.ondblclick = () => window.open(f.url);

    box.appendChild(div);
  });
}

/* ================= 选择 ================= */
function toggle(key){
  if(selected.has(key)) selected.delete(key);
  else selected.add(key);

  render();
}

/* ================= 删除 ================= */
async function deleteSelected(){
  await fetch(`${API}/delete`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify([...selected])
  });

  selected.clear();
  loadFiles();
}

/* ================= 上传 ================= */
async function upload(filesList){
  for(let f of filesList){
    const fd = new FormData();
    fd.append("file", f);

    await fetch(`${API}/upload`, {
      method: "POST",
      body: fd
    });
  }

  loadFiles();
}

/* ================= input上传 ================= */
document.getElementById("fileInput").onchange = e => {
  upload(e.target.files);
};

/* ================= 文件管理拖拽 ================= */
const dropzone = document.getElementById("dropzone");

dropzone.ondragover = e => {
  e.preventDefault();
  dropzone.style.background = "#eaf3ff";
};

dropzone.ondragleave = () => {
  dropzone.style.background = "white";
};

dropzone.ondrop = e => {
  e.preventDefault();
  dropzone.style.background = "white";
  upload(e.dataTransfer.files);
};

/* ================= ⭐ QR页面拖拽上传（新增功能） ================= */
const qrDropzone = document.getElementById("qrDropzone");

if (qrDropzone) {

  qrDropzone.ondragover = e => {
    e.preventDefault();
    qrDropzone.style.background = "#eaf3ff";
  };

  qrDropzone.ondragleave = () => {
    qrDropzone.style.background = "white";
  };

  qrDropzone.ondrop = e => {
    e.preventDefault();
    qrDropzone.style.background = "white";

    upload(e.dataTransfer.files);
  };
}

</script>

</body>
</html>
